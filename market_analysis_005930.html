
<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>시장조사 리포트 - 삼성전자</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Noto+Sans+KR:wght@400;500;700&display=swap" rel="stylesheet">
    <style>* { font-family: 'Noto Sans KR', sans-serif; }</style>
</head>
<body class="bg-gray-100 py-8">
    <div class="max-w-4xl mx-auto bg-white rounded-xl shadow-lg p-8">
        <div class="text-center mb-8">
            <h1 class="text-3xl font-bold text-gray-800">삼성전자 (005930)</h1>
            <p class="text-gray-500 mt-2">반도체 | 2026-03-18</p>
        </div>
        
        <div class="bg-gradient-to-r from-blue-500 to-purple-600 rounded-xl p-6 text-white text-center mb-8">
            <div class="text-5xl font-bold">100.0</div>
            <div class="text-xl mt-2">종합 점수</div>
            <div class="text-2xl font-bold mt-4">STRONG_BUY</div>
        </div>

        <div class="mb-6">
            <h2 class="text-xl font-bold mb-4">📰 뉴스 감성 분석</h2>
            <div class="grid grid-cols-2 gap-4">
                <div class="bg-gray-50 p-4 rounded-lg">
                    <div class="text-sm text-gray-500">감성 점수</div>
                    <div class="text-2xl font-bold text-green-600">+0.50</div>
                </div>
                <div class="bg-gray-50 p-4 rounded-lg">
                    <div class="text-sm text-gray-500">언급 횟수</div>
                    <div class="text-2xl font-bold">20회</div>
                </div>
            </div>
        </div>

        <div class="mb-6">
            <h2 class="text-xl font-bold mb-4">🏭 산업 분석</h2>
            <div class="grid grid-cols-2 gap-4">
                <div class="bg-green-50 p-4 rounded-lg">
                    <div class="text-sm text-gray-500">연평균 성장률</div>
                    <div class="text-2xl font-bold text-green-600">18.5%</div>
                </div>
                <div class="bg-blue-50 p-4 rounded-lg">
                    <div class="text-sm text-gray-500">시장 규모</div>
                    <div class="text-2xl font-bold text-blue-600">612B USD</div>
                </div>
            </div>
        </div>

    </div>
</body>
</html>
