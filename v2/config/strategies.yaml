  로봇: ["로봇", "자동화", "자율주행", "드론", "협동로봇"]
  AI: ["AI", "인공지능", "딥러닝", "머신러닝", "GPT", "LLM"]
  바이오: ["바이오", "제약", "신약", "바이오텍", "헬스케어"]
  반도체: ["반도체", "칩", "파운드리", "메모리", "HBM"]
  전기차: ["전기차", "배터리", "2차전지", "EV"]
  원자재: ["철강", "비철금속", "화학", "유화"]
