<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>통합 전략 리포트</title>
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; -webkit-tap-highlight-color: transparent; }
        html { font-size: 16px; }
        @media (max-width: 480px) { html { font-size: 14px; } }
        
        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
            background: linear-gradient(135deg, #1a1a2e 0%, #16213e 100%);
            min-height: 100vh;
            color: #eee;
            line-height: 1.6;
        }
        
        .container {
            max-width: 100%;
            margin: 0 auto;
            padding: 0;
        }
        @media (min-width: 768px) {
            .container {
                max-width: 1200px;
                padding: 20px;
            }
        }
        
        /* Header */
        .header {
            background: linear-gradient(135deg, #ff6b35 0%, #00d9a5 100%);
            color: white;
            padding: 2.5rem 1.5rem;
            text-align: center;
        }
        .header h1 { font-size: 2rem; margin-bottom: 0.5rem; font-weight: 700; }
        .header p { opacity: 0.9; font-size: 1rem; }
        .header .date { font-size: 0.9rem; opacity: 0.8; margin-top: 0.5rem; }
        
        /* Stats Grid */
        .stats-grid {
            display: grid;
            grid-template-columns: repeat(2, 1fr);
            gap: 1rem;
            padding: 1.5rem;
        }
        @media (min-width: 768px) {
            .stats-grid { grid-template-columns: repeat(auto-fit, minmax(180px, 1fr)); }
        }
        
        .stat-card {
            background: rgba(255,255,255,0.05);
            padding: 1.5rem 1rem;
            border-radius: 16px;
            text-align: center;
            border: 1px solid rgba(255,255,255,0.1);
            transition: transform 0.2s;
        }
        .stat-card:hover { transform: translateY(-3px); }
        .stat-value {
            font-size: 2rem;
            font-weight: bold;
            color: #ff6b35;
            margin: 0.5rem 0;
        }
        .stat-value.positive { color: #00d9a5; }
        .stat-value.negative { color: #ff4757; }
        .stat-label { font-size: 0.85rem; opacity: 0.7; }
        
        /* Sections */
        .section {
            background: rgba(255,255,255,0.05);
            margin: 1rem;
            padding: 1.5rem;
            border-radius: 16px;
            border: 1px solid rgba(255,255,255,0.1);
        }
        @media (min-width: 768px) {
            .section { margin: 1.5rem 0; }
        }
        
        .section h2 {
            font-size: 1.2rem;
            margin-bottom: 1rem;
            padding-bottom: 0.75rem;
            border-bottom: 2px solid #ff6b35;
        }
        
        /* Tables */
        .table-container { overflow-x: auto; }
        table {
            width: 100%;
            border-collapse: collapse;
            font-size: 0.9rem;
        }
        th, td {
            padding: 12px 10px;
            text-align: left;
            border-bottom: 1px solid rgba(255,255,255,0.1);
        }
        th {
            font-weight: 600;
            opacity: 0.8;
            font-size: 0.8rem;
            text-transform: uppercase;
        }
        tr:hover { background: rgba(255,255,255,0.03); }
        
        /* Badges */
        .badge {
            display: inline-block;
            padding: 4px 10px;
            border-radius: 12px;
            font-size: 0.75rem;
            font-weight: 600;
        }
        .badge-tp { background: #00d9a5; color: #000; }
        .badge-sl { background: #ff4757; color: #fff; }
        .badge-time { background: #ffa502; color: #000; }
        
        /* Charts */
        .chart-container {
            position: relative;
            height: 250px;
            margin: 1.5rem 0;
        }
        
        /* Strategy Cards */
        .strategy-grid {
            display: grid;
            grid-template-columns: 1fr;
            gap: 1rem;
        }
        @media (min-width: 768px) {
            .strategy-grid { grid-template-columns: repeat(auto-fit, minmax(300px, 1fr)); }
        }
        
        .strategy-card {
            background: rgba(255,255,255,0.05);
            padding: 1.5rem;
            border-radius: 16px;
            border: 1px solid rgba(255,255,255,0.1);
            border-left: 4px solid #ff6b35;
        }
        .strategy-card h3 { margin-bottom: 0.5rem; color: #ff6b35; }
        .strategy-card p { opacity: 0.7; font-size: 0.9rem; margin-bottom: 1rem; }
        
        /* Footer */
        footer {
            text-align: center;
            padding: 2rem;
            opacity: 0.5;
            font-size: 0.85rem;
        }
        
        /* Progress Bar */
        .progress-bar {
            width: 100%;
            height: 8px;
            background: rgba(255,255,255,0.1);
            border-radius: 4px;
            overflow: hidden;
            margin-top: 0.5rem;
        }
        .progress-fill {
            height: 100%;
            background: #00d9a5;
            border-radius: 4px;
            transition: width 0.5s ease;
        }
    </style>
</head>
<body>
    
    <div class="header">
        <h1>통합 전략 리포트</h1>
        <p>모든 전략 성과 비교</p>
        <div class="date">2026년 04월 12일</div>
    </div>
    
    
    <div class="stats-grid">
        <div class="stat-card">
            <div class="stat-label">총 거래 수</div>
            <div class="stat-value">1,674</div>
        </div>
        <div class="stat-card">
            <div class="stat-label">승률</div>
            <div class="stat-value positive">53.4%</div>
        </div>
        <div class="stat-card">
            <div class="stat-label">평균 수익률</div>
            <div class="stat-value positive">+1.13%</div>
        </div>
        <div class="stat-card">
            <div class="stat-label">총 수익률</div>
            <div class="stat-value positive">+0.0%</div>
        </div>
    </div>
    
    
    <div class="section">
        <h2>📊 전략 비교</h2>
        <div class="strategy-grid">
            
        <div class="strategy-card">
            <h3>불개미 단타 전략</h3>
            <p>장 시작 30분 오프닝 브레이크아웃</p>
            <div style="display: grid; grid-template-columns: repeat(2, 1fr); gap: 1rem;">
                <div>
                    <div class="stat-label">승률</div>
                    <div class="stat-value" style="color: #00d9a5">52.2%</div>
                </div>
                <div>
                    <div class="stat-label">평균 수익</div>
                    <div class="stat-value">+0.85%</div>
                </div>
            </div>
            <div class="progress-bar" style="margin-top: 1rem;">
                <div class="progress-fill" style="width: 52.17391304347826%; background: #00d9a5"></div>
            </div>
        </div>
        <div class="strategy-card">
            <h3>일본 고전 패턴</h3>
            <p>일목균형표 TK_CROSS</p>
            <div style="display: grid; grid-template-columns: repeat(2, 1fr); gap: 1rem;">
                <div>
                    <div class="stat-label">승률</div>
                    <div class="stat-value" style="color: #00d9a5">54.6%</div>
                </div>
                <div>
                    <div class="stat-label">평균 수익</div>
                    <div class="stat-value">+1.42%</div>
                </div>
            </div>
            <div class="progress-bar" style="margin-top: 1rem;">
                <div class="progress-fill" style="width: 54.6%; background: #00d9a5"></div>
            </div>
        </div>
        </div>
    </div>
    <footer>
        <p>KStock Unified Report | Generated: 2026-04-12 11:40</p>
        <p style="font-size: 0.75rem; margin-top: 0.5rem;">* 과거 성과가 미래 수익을 보장하지 않습니다</p>
    </footer>
    
    <script>
        // Exit Distribution Chart
        const ctx = document.getElementById('exitChart');
        if (ctx) {
            new Chart(ctx, {
                type: 'doughnut',
                data: {
                    labels: ['익절', '손절'],
                    datasets: [{
                        data: [52, 48],
                        backgroundColor: ['#00d9a5', '#ff4757'],
                        borderWidth: 0
                    }]
                },
                options: {
                    responsive: true,
                    maintainAspectRatio: false,
                    plugins: {
                        legend: {
                            position: 'right',
                            labels: { color: '#eee', font: { size: 14 } }
                        }
                    }
                }
            });
        }
    </script>
</body>
</html>
